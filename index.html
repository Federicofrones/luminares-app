<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- Metadatos de Aplicación -->
  <meta name="theme-color" id="theme-meta" content="#1e3a8a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="./logo.png">
  <link rel="icon" type="image/png" href="./logo.png">
  <link rel="manifest" href="./manifest.json">
  <title>Luminares - Gestión Dual</title>

  <!-- Recursos -->
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600;900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --primary: #1e3a8a;
      --bg-page: #f8fafc;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-page);
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.4s ease;
    }

    .font-logo {
      font-family: 'Dancing Script', cursive;
    }

    .theme-melina {
      --primary: #1e3a8a;
      --bg-soft: #eff6ff;
    }

    .theme-federico {
      --primary: #166534;
      --bg-soft: #f0fdf4;
    }

    .text-primary {
      color: var(--primary);
    }

    .bg-primary {
      background-color: var(--primary);
    }

    .card-shadow {
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    .btn-press:active {
      transform: scale(0.96);
      transition: 0.1s;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .modal-animate {
      animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Estilos Modo Presentación */
    .present-mode {
      position: fixed;
      inset: 0;
      background: #0f172a;
      z-index: 9999;
      /* Asegurar que esté por encima de TODO */
      display: flex;
      flex-direction: column;
      padding: 2rem;
      padding-top: calc(2rem + env(safe-area-inset-top));
      padding-bottom: calc(2rem + env(safe-area-inset-bottom));
      color: white;
      overflow-y: auto;
      /* Para móviles si el contenido es largo */
    }

    header {
      padding-top: env(safe-area-inset-top);
    }

    .sticky-day-selector {
      position: sticky;
      top: 60px;
      /* Debajo del header discretamente */
      z-index: 40;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body class="theme-melina pb-10">

  <!-- Header Principal -->
  <header class="bg-white border-b border-slate-100 sticky top-0 z-50">
    <div class="max-w-lg mx-auto px-6 py-3 flex items-center justify-between">
      <div class="text-left flex items-center gap-3">
        <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-slate-200"></div>
        <div class="leading-none">
          <h1 class="text-2xl font-logo text-primary leading-none">Luminares</h1>
          <p id="status-text" class="text-[7px] font-black text-slate-400 uppercase tracking-[0.2em] mt-0.5">
            Iniciando...</p>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <div id="logout-btn-top" class="hidden">
          <button onclick="logout()" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
              </path>
            </svg>
          </button>
        </div>
        <button onclick="openModal()"
          class="w-10 h-10 bg-primary/10 text-primary rounded-xl flex items-center justify-center btn-press">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
            <path d="M12 5v14m-7-7h14"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="max-w-lg mx-auto px-6 pb-4">
      <div class="flex bg-slate-100 p-1.5 rounded-2xl">
        <button onclick="switchTeacher('Melina')" id="tab-Melina"
          class="flex-1 py-3 rounded-xl text-[11px] font-black transition-all bg-white text-blue-900 shadow-sm">MELINA</button>
        <button onclick="switchTeacher('Federico')" id="tab-Federico"
          class="flex-1 py-3 rounded-xl text-[11px] font-black transition-all text-slate-400">FEDERICO</button>
      </div>
    </div>
  </header>

  <!-- Login simple (Email/Password) -->
  <div id="login-card" class="max-w-lg mx-auto px-6 mt-4">
    <div class="bg-white border border-slate-100 rounded-2xl p-4 card-shadow">
      <div class="flex items-center justify-between gap-3">
        <div class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Acceso</div>
        <div id="user-label" class="text-[10px] font-black text-slate-500 truncate">No autenticado</div>
      </div>

      <div id="login-form">
        <div class="grid grid-cols-2 gap-3 mt-3">
          <input id="email" type="email" placeholder="email"
            class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl py-3 px-4 outline-none font-bold text-slate-700">
          <input id="password" type="password" placeholder="contraseña"
            class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl py-3 px-4 outline-none font-bold text-slate-700">
        </div>

        <div class="flex gap-3 mt-3">
          <button onclick="login()"
            class="w-full bg-primary text-white font-black py-3 rounded-2xl btn-press text-xs uppercase tracking-widest">Ingresar</button>
        </div>
      </div>

      <!-- Alerta de Pagos -->
      <div id="payment-alert"
        class="hidden mt-3 p-3 bg-red-50 border border-red-100 rounded-xl flex items-center gap-3">
        <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
        <span id="payment-alert-text"
          class="text-[10px] font-black text-red-600 uppercase tracking-widest tracking-tight"></span>
      </div>

      <div id="auth-msg" class="text-[11px] font-bold text-slate-500 mt-2"></div>
    </div>
  </div>

  <!-- Navegación de Días -->
  <div class="sticky-day-selector border-b border-slate-50">
    <div class="max-w-lg mx-auto px-4 py-3 flex justify-between items-center">
      <button onclick="changeDay(-1)" class="p-2 text-slate-300 active:text-primary"><svg width="24" height="24"
          fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path d="M15 19l-7-7 7-7"></path>
        </svg></button>
      <div class="flex flex-col items-center">
        <div id="day-label" class="text-xs font-black text-primary uppercase tracking-widest min-w-[120px] text-center">
          Lunes</div>
        <button onclick="togglePresent()"
          class="text-[8px] font-bold text-slate-400 mt-1 uppercase border-b border-dotted border-slate-300">Modo
          Aula</button>
      </div>
      <button onclick="changeDay(1)" class="p-2 text-slate-300 active:text-primary"><svg width="24" height="24"
          fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path d="M9 5l7 7-7 7"></path>
        </svg></button>
    </div>
  </div>

  <!-- Buscador -->
  <div class="max-w-lg mx-auto px-6 mt-6">
    <div class="relative">
      <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-300">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="M21 21l-4.35-4.35"></path>
        </svg>
      </div>
      <input type="text" id="search" oninput="render()" placeholder="Buscar alumno..."
        class="w-full bg-white border border-slate-100 rounded-2xl py-4 pl-12 pr-4 text-sm outline-none focus:ring-4 ring-primary/5 transition-all card-shadow">
    </div>
  </div>

  <!-- Lista de Agenda -->
  <main id="schedule" class="max-w-lg mx-auto px-6 py-6 space-y-3"></main>

  <!-- Modal Formulario -->
  <div id="modal"
    class="fixed inset-0 z-[60] bg-slate-900/60 backdrop-blur-sm hidden items-end sm:items-center justify-center p-4">
    <div
      class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] overflow-hidden modal-animate flex flex-col shadow-2xl">
      <div class="p-8 pb-4 flex justify-between items-center border-b border-slate-50">
        <h2 id="modal-title" class="text-2xl font-black text-slate-800 italic">Clase</h2>
        <button onclick="closeModal()"
          class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400">✕</button>
      </div>

      <div class="p-8 pt-6 overflow-y-auto no-scrollbar max-h-[75vh]">
        <form id="form" class="space-y-5">
          <input type="hidden" id="edit-id">

          <div>
            <label class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-1 block text-left">Alumno</label>
            <input id="student" type="text" required placeholder="Nombre..."
              class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl py-4 px-6 focus:border-primary focus:bg-white outline-none font-bold text-slate-700 transition-all">
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label
                class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-1 block text-left">Instrumento</label>
              <input id="instrument" type="text" required placeholder="Ej. Piano"
                class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl py-4 px-6 focus:border-primary focus:bg-white outline-none font-bold text-slate-700 transition-all">
            </div>
            <div>
              <label class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-1 block text-left">WhatsApp</label>
              <input id="phone" type="tel" placeholder="Sin +"
                class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl py-4 px-6 focus:border-primary focus:bg-white outline-none font-bold text-slate-700 transition-all">
            </div>
          </div>

          <div class="grid grid-cols-3 gap-3">
            <div>
              <label class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-1 block text-left">Día</label>
              <select id="day"
                class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl py-4 px-2 font-bold text-slate-700 outline-none">
                <option value="1">Lun</option>
                <option value="2">Mar</option>
                <option value="3">Mié</option>
                <option value="4">Jue</option>
                <option value="5">Vie</option>
                <option value="6">Sáb</option>
                <option value="0">Dom</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-1 block text-left">Hora</label>
              <select id="hour"
                class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl py-4 px-2 font-bold text-slate-700 outline-none"></select>
            </div>
            <div>
              <label class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-1 block text-left">Bloque</label>
              <select id="duration"
                class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl py-4 px-2 font-bold text-primary outline-none">
                <option value="1">1h</option>
                <option value="2">2h</option>
                <option value="3">3h</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-1 block text-left">Año</label>
              <select id="course-year"
                class="w-full bg-slate-50 border-2 border-slate-50 rounded-2xl py-4 px-6 font-bold text-slate-700 outline-none">
                <option value="">-</option>
                <option value="1° Año">1° Año</option>
                <option value="2° Año">2° Año</option>
                <option value="3° Año">3° Año</option>
                <option value="4° Año">4° Año</option>
                <option value="5° Año">5° Año</option>
                <option value="6° Año">6° Año</option>
                <option value="7° Año">7° Año</option>
                <option value="Egresado">Egresado</option>
              </select>
            </div>
            <div class="flex items-center gap-3 mt-6">
              <input type="checkbox" id="paid"
                class="w-6 h-6 rounded-lg text-primary focus:ring-primary border-2 border-slate-200">
              <label for="paid" class="text-[10px] font-black text-slate-500 uppercase">AL DÍA</label>
            </div>
          </div>

          <div class="flex gap-4 pt-4 pb-8">
            <button type="button" id="btn-del" onclick="deleteClass()"
              class="hidden p-5 bg-red-50 text-red-500 rounded-3xl btn-press transition-colors hover:bg-red-100">
              <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path
                  d="M19 7l-.8 12A2 2 0 0116 21H8a2 2 0 01-2-1.8L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                </path>
              </svg>
            </button>
            <button type="submit"
              class="flex-1 bg-primary text-white font-black py-5 rounded-[2rem] shadow-xl shadow-blue-900/20 btn-press uppercase tracking-widest text-xs">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Barra de Estado (Eliminada de abajo) -->

  <!-- Overlay Modo Presentación -->
  <div id="present-overlay" class="present-mode hidden">
    <div class="flex justify-between items-start mb-12">
      <div>
        <h2 class="text-blue-400 font-black uppercase tracking-[0.3em] text-sm">Modo Aula</h2>
        <div id="present-clock" class="text-5xl font-black mt-2">12:00</div>
      </div>
      <button onclick="togglePresent()" class="bg-white/10 p-4 rounded-full">✕</button>
    </div>

    <div id="present-content" class="flex-1 flex flex-col justify-center gap-12">
      <!-- Se llena dinámicamente -->
    </div>

    <div class="mt-auto flex justify-between items-end border-t border-white/5 pt-8">
      <div class="text-[10px] font-black uppercase tracking-widest opacity-40">
        Luminares Pro • Aula Digital
      </div>
      <div id="class-timer" class="text-right">
        <div class="text-[10px] font-black uppercase tracking-widest text-blue-400 mb-1">Finaliza en</div>
        <div id="timer-countdown" class="text-2xl font-black">--:--</div>
      </div>
    </div>
  </div>

  <script>
    /***********************
     * 1) PEGA TU CONFIG
     ***********************/
    const firebaseConfig = {
      apiKey: "AIzaSyBbQhOQ8dYjr5-Px8F6G0xQT7f8uXvjEOs",
      authDomain: "luminares-app-7b8f7.firebaseapp.com",
      projectId: "luminares-app-7b8f7",
      storageBucket: "luminares-app-7b8f7.firebasestorage.app",
      messagingSenderId: "1050973315590",
      appId: "1:1050973315590:web:8e835175a86b3d9c8cd987"
    };

    /***********************
     * Estado global
     ***********************/
    const appId = 'luminares-pro-dual'; // id lógico de tu app
    let db, auth, unsub;
    let classes = [];
    let teacher = 'Melina';
    let isPresenting = false;
    let dayIdx = (new Date().getDay());
    const dayNames = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];

    /***********************
     * Inicialización Firebase
     ***********************/
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();

    function setStatus(text, dotClass) {
      const txtEl = document.getElementById('status-text');
      const dotEl = document.getElementById('status-dot');
      if (txtEl) txtEl.innerText = text;
      if (dotEl) dotEl.className = `w-2 h-2 rounded-full ${dotClass}`;
    }

    function setAuthMsg(t) {
      document.getElementById('auth-msg').innerText = t || '';
    }

    /***********************
     * Login / Logout
     ***********************/
    async function login() {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      setAuthMsg('');
      setStatus('Ingresando...', 'bg-blue-400 animate-pulse');
      try {
        await auth.signInWithEmailAndPassword(email, pass);
      } catch (e) {
        setAuthMsg(e.message || String(e));
        setStatus('Falla de acceso', 'bg-red-500');
      }
    }

    async function logout() {
      setAuthMsg('');
      try {
        await auth.signOut();
      } catch (e) {
        setAuthMsg(e.message || String(e));
      }
    }

    /***********************
     * Firestore: ruta estable
     ***********************/
    function collectionPath() {
      // Simple y estable: una colección clara, sin "artifacts/..." ni rutas raras
      // Si querés separar por appId, lo hacemos con subcolección:
      return `apps/${appId}/clases`;
    }

    function loadData() {
      if (unsub) unsub();
      if (!auth.currentUser) return;

      const path = collectionPath();
      unsub = db.collection(path).onSnapshot(snap => {
        classes = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
        setStatus('Luminares Online', 'bg-green-500');
      }, err => {
        console.error("Firestore Error:", err);
        if (err.code === 'permission-denied') setStatus('Reglas Firebase (permission-denied)', 'bg-red-500');
        else setStatus('Error de datos', 'bg-red-400');
      });
    }

    /***********************
     * UI: render
     ***********************/
    function render() {
      const container = document.getElementById('schedule');
      const query = document.getElementById('search').value.toLowerCase();
      document.getElementById('day-label').innerText = dayNames[dayIdx];
      container.innerHTML = '';

      const list = classes.filter(c => c.teacher === teacher && parseInt(c.day) === dayIdx);

      for (let h = 8; h <= 21; h++) {
        const item = list.find(c => h >= parseInt(c.hour) && h < (parseInt(c.hour) + parseInt(c.duration || 1)));
        if (query && item && !String(item.student || '').toLowerCase().includes(query) && !String(item.instrument || '').toLowerCase().includes(query)) continue;

        const row = document.createElement('div');
        row.className = 'flex gap-4 items-center';

        if (item) {
          if (parseInt(item.hour) === h) {
            const dur = parseInt(item.duration || 1);
            row.innerHTML = `
              <div class="w-10 text-right text-[10px] font-black text-slate-300 uppercase">${h}:00</div>
              <div onclick="openModal('${item.id}')" class="flex-1 bg-white p-5 rounded-[2rem] border border-slate-100 card-shadow btn-press flex justify-between items-center overflow-hidden">
                <div class="text-left overflow-hidden">
                  <div class="flex items-center gap-2 mb-0.5">
                    <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">${item.instrument || ''}</span>
                    ${item.year ? `<span class="text-[7px] bg-primary/10 text-primary px-2 py-0.5 rounded font-black">${item.year}</span>` : ''}
                    ${dur > 1 ? `<span class="text-[7px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-bold uppercase">${dur} HS</span>` : ''}
                  </div>
                  <h3 class="font-black text-lg leading-tight truncate ${item.paid ? 'text-primary' : 'text-red-500'}">${item.student || ''}</h3>
                </div>
                <button onclick="event.stopPropagation(); ws('${item.phone || ''}','${item.student || ''}','${h}')" class="w-12 h-12 bg-green-500 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-green-200">
                  <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766 0-3.18-2.587-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.984-.365-1.739-.757-2.874-2.513-2.96-2.63-.086-.116-.693-.926-.693-1.764 0-.838.435-1.25.591-1.416.155-.165.338-.209.45-.209.113 0 .225.001.322.005.101.003.239-.038.374.286.141.338.481 1.172.523 1.256.042.084.07.183.014.295-.056.113-.085.183-.169.282-.085.099-.178.221-.253.296-.085.084-.173.174-.075.343.099.169.439.726.942 1.174.647.577 1.192.755 1.361.839.169.084.268.07.366-.042.098-.113.423-.493.537-.662.113-.169.225-.141.379-.084.156.056.985.465 1.155.55.17.084.283.126.324.197.041.07.041.408-.103.813z"/></svg>
                </button>
              </div>`;
          } else {
            row.innerHTML = `<div class="w-10 text-right text-[10px] font-black text-slate-300 opacity-20">${h}:00</div><div class="flex-1 py-1"><div class="h-8 w-1 bg-primary/20 rounded-full ml-10"></div></div>`;
          }
        } else {
          row.innerHTML = `<div class="w-10 text-right text-[10px] font-black text-slate-200 uppercase">${h}:00</div>
            <button onclick="openModal(null, ${h})" class="flex-1 p-5 rounded-[2.2rem] border-2 border-dashed border-slate-200 text-slate-300 text-[10px] font-black uppercase hover:bg-white active:bg-primary/5 transition-colors tracking-widest">+ Libre</button>`;
        }

        container.appendChild(row);
      }

      renderPaymentAlert(list);
      if (isPresenting) renderPresentMode(list);
    }

    function renderPaymentAlert(list) {
      const pending = list.filter(c => !c.paid).length;
      const el = document.getElementById('payment-alert');
      const txt = document.getElementById('payment-alert-text');
      if (pending > 0) {
        el.classList.remove('hidden');
        txt.innerText = `${pending} ALUMNOS PENDIENTES DE PAGO HOY`;
      } else {
        el.classList.add('hidden');
      }
    }

    function getUruguayDate() {
      // Uruguay es UTC-3 fijo
      const now = new Date();
      const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
      return new Date(utc + (3600000 * -3));
    }

    function togglePresent() {
      if (!auth.currentUser) return;
      isPresenting = !isPresenting;
      const el = document.getElementById('present-overlay');
      el.classList.toggle('hidden', !isPresenting);

      // Ocultar/Mostrar el scroll del body
      document.body.style.overflow = isPresenting ? 'hidden' : '';

      // Ocultar resto de la UI para que sea una sección aparte
      const header = document.querySelector('header');
      if (header) header.classList.toggle('hidden', isPresenting);

      const loginCard = document.getElementById('login-card');
      if (loginCard) loginCard.classList.toggle('hidden', isPresenting || !auth.currentUser);

      const stickyDay = document.querySelector('.sticky-day-selector');
      if (stickyDay) stickyDay.classList.toggle('hidden', isPresenting);

      const schedule = document.getElementById('schedule');
      if (schedule) schedule.classList.toggle('hidden', isPresenting);

      const searchBox = document.getElementById('search')?.parentElement?.parentElement;
      if (searchBox) searchBox.classList.toggle('hidden', isPresenting);


      if (isPresenting) {
        render();
        // Iniciar ciclo de actualización
        if (window.presentTimer) clearInterval(window.presentTimer);
        window.presentTimer = setInterval(updatePresentTimer, 1000); // Actualizar cada segundo para precisión
        updatePresentTimer();
      } else {
        if (window.presentTimer) clearInterval(window.presentTimer);
      }
    }

    function updatePresentTimer() {
      if (!isPresenting) return;

      const now = getUruguayDate();
      // Reloj principal
      const hStr = now.getHours().toString().padStart(2, '0');
      const mStr = now.getMinutes().toString().padStart(2, '0');
      const sStr = now.getSeconds().toString().padStart(2, '0');
      document.getElementById('present-clock').innerText = `${hStr}:${mStr}:${sStr}`;

      // Temporizador de clase
      const currentH = now.getHours();
      const currentM = now.getMinutes();
      const list = classes.filter(c => c.teacher === teacher && parseInt(c.day) === getUruguayDate().getDay());
      const current = list.find(c => currentH >= parseInt(c.hour) && currentH < (parseInt(c.hour) + parseInt(c.duration || 1)));

      const timerEl = document.getElementById('class-timer');
      const countEl = document.getElementById('timer-countdown');

      if (current) {
        timerEl.classList.remove('opacity-0');
        const endHour = parseInt(current.hour) + parseInt(current.duration || 1);
        const totalEndMinutes = endHour * 60;
        const totalCurrentMinutes = (currentH * 60) + currentM;
        const diff = totalEndMinutes - totalCurrentMinutes;

        if (diff > 0) {
          const mRemain = diff - 1; // minutos restantes
          const sRemain = 60 - now.getSeconds();
          countEl.innerText = `${mRemain}m ${sRemain}s`;
        } else {
          countEl.innerText = "Finalizada";
        }
      } else {
        timerEl.classList.add('opacity-0');
      }

      // Si cambia la hora de inicio de una clase, re-renderizar el contenido
      if (now.getMinutes() === 0 && now.getSeconds() === 0) render();
    }

    function renderPresentMode(list) {
      const container = document.getElementById('present-content');
      const now = getUruguayDate();
      const currentH = now.getHours();

      const current = list.find(c => currentH >= parseInt(c.hour) && currentH < (parseInt(c.hour) + parseInt(c.duration || 1)));
      const next = list.filter(c => parseInt(c.hour) > currentH).sort((a, b) => a.hour - b.hour)[0];

      container.innerHTML = `
        <div class="space-y-6">
          <div class="flex items-center gap-4">
             <div class="w-12 h-1 bg-blue-500 rounded-full"></div>
             <div class="text-[12px] font-black uppercase text-blue-400 tracking-[0.3em]">En Curso</div>
          </div>
          ${current ? `
            <div class="bg-gradient-to-br from-white/10 to-transparent border border-white/10 p-12 rounded-[4rem] shadow-2xl">
              <div class="flex items-center gap-4 mb-4">
                <span class="bg-blue-500 text-white text-[10px] font-black px-4 py-1 rounded-full uppercase tracking-widest">${current.instrument}</span>
                ${current.year ? `<span class="border border-white/20 text-white/60 text-[10px] font-bold px-4 py-1 rounded-full uppercase">${current.year}</span>` : ''}
              </div>
              <div class="text-7xl font-black tracking-tight mb-6">${current.student}</div>
              ${!current.paid ? `
                <div class="flex items-center gap-3 text-red-400 bg-red-400/10 self-start px-6 py-3 rounded-2xl border border-red-400/20">
                  <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                  <span class="text-xs font-black uppercase tracking-widest">Pendiente de Pago</span>
                </div>
              ` : ''}
            </div>
          ` : '<div class="text-4xl font-black opacity-20 italic py-10">Sin clase programada ahora</div>'}
        </div>

        <div class="mt-8 space-y-4">
          <div class="text-[10px] font-black uppercase text-white/30 tracking-[0.3em] ml-2">Próxima Clase</div>
          ${next ? `
            <div class="flex items-center justify-between bg-white/5 p-8 rounded-[2.5rem] border border-white/5">
              <div class="flex items-center gap-8">
                <div class="text-4xl font-black text-blue-500/80">${next.hour}:00</div>
                <div>
                  <div class="text-3xl font-black">${next.student}</div>
                  <div class="text-xs font-bold opacity-40 uppercase tracking-widest">${next.instrument}</div>
                </div>
              </div>
              <div class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center">
                <svg width="20" height="20" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24" class="opacity-20"><path d="M9 5l7 7-7 7"></path></svg>
              </div>
            </div>
          ` : '<div class="text-xl font-bold opacity-20 italic ml-2">Fin de la jornada</div>'}
        </div>
      `;
    }

    function ws(p, s, h) {
      if (!p) return;
      window.open(`https://wa.me/${String(p).replace(/\D/g, '')}?text=${encodeURIComponent('Hola ' + s + ', te recordamos tu clase hoy a las ' + h + ':00 en Luminares.')}`, '_blank');
    }

    function openModal(id = null, h = 10) {
      const f = document.getElementById('form'); f.reset();
      document.getElementById('edit-id').value = id || '';
      document.getElementById('day').value = dayIdx;
      document.getElementById('hour').value = h;
      document.getElementById('duration').value = 1;
      document.getElementById('course-year').value = '';
      document.getElementById('btn-del').classList.toggle('hidden', !id);

      if (id) {
        const d = classes.find(c => c.id === id);
        if (d) {
          document.getElementById('student').value = d.student || '';
          document.getElementById('instrument').value = d.instrument || '';
          document.getElementById('phone').value = d.phone || '';
          document.getElementById('day').value = d.day;
          document.getElementById('hour').value = d.hour;
          document.getElementById('duration').value = d.duration || 1;
          document.getElementById('course-year').value = d.year || '';
          document.getElementById('paid').checked = !!d.paid;
        }
      }

      const modal = document.getElementById('modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    document.getElementById('form').onsubmit = async (e) => {
      e.preventDefault();
      if (!auth.currentUser) {
        setStatus('Inicia sesión', 'bg-yellow-400 animate-pulse');
        return;
      }

      const id = document.getElementById('edit-id').value;
      const data = {
        student: document.getElementById('student').value.trim(),
        instrument: document.getElementById('instrument').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        day: parseInt(document.getElementById('day').value),
        hour: parseInt(document.getElementById('hour').value),
        duration: parseInt(document.getElementById('duration').value),
        year: document.getElementById('course-year').value,
        paid: document.getElementById('paid').checked,
        teacher: teacher,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      const path = collectionPath();
      setStatus('Sincronizando...', 'bg-blue-400 animate-pulse');

      try {
        if (id) await db.collection(path).doc(id).update(data);
        else await db.collection(path).add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });

        closeModal();
        setStatus('Luminares Online', 'bg-green-500');
      } catch (e2) {
        console.error(e2);
        setStatus('Error al guardar', 'bg-red-500');
      }
    };

    async function deleteClass() {
      const id = document.getElementById('edit-id').value;
      if (!id) return;
      if (!auth.currentUser) return;

      const path = collectionPath();
      setStatus('Eliminando...', 'bg-red-400 animate-pulse');

      try {
        await db.collection(path).doc(id).delete();
        closeModal();
        setStatus('Luminares Online', 'bg-green-500');
      } catch (e) {
        console.error(e);
        setStatus('Error al eliminar', 'bg-red-500');
      }
    }

    function switchTeacher(name) {
      teacher = name;
      document.body.className = `theme-${name.toLowerCase()} pb-10`;
      document.getElementById('tab-Melina').className =
        `flex-1 py-3 rounded-xl text-[11px] font-black transition-all ${name === 'Melina' ? 'bg-white text-primary shadow-sm' : 'text-slate-400'}`;
      document.getElementById('tab-Federico').className =
        `flex-1 py-3 rounded-xl text-[11px] font-black transition-all ${name === 'Federico' ? 'bg-white text-primary shadow-sm' : 'text-slate-400'}`;
      document.getElementById('theme-meta').content = name === 'Melina' ? '#1e3a8a' : '#166534';
      render();
    }

    function changeDay(step) {
      dayIdx = (dayIdx + step + 7) % 7;
      render();
    }

    /***********************
     * Init general
     ***********************/
    function fillHours() {
      const hSel = document.getElementById('hour');
      hSel.innerHTML = '';
      for (let i = 8; i <= 21; i++) hSel.innerHTML += `<option value="${i}">${i}:00</option>`;
    }

    window.onload = () => {
      fillHours();
      setStatus('Iniciando...', 'bg-yellow-400 animate-pulse');

      auth.onAuthStateChanged((user) => {
        const label = document.getElementById('user-label');
        const loginCard = document.getElementById('login-card');
        const logoutBtnTop = document.getElementById('logout-btn-top');

        if (user) {
          label.textContent = user.email || user.uid;
          loginCard.classList.add('hidden');
          logoutBtnTop.classList.remove('hidden');
          setAuthMsg('');
          loadData();
          setStatus('Luminares Online', 'bg-green-500');
        } else {
          label.textContent = 'No autenticado';
          loginCard.classList.remove('hidden');
          logoutBtnTop.classList.add('hidden');
          if (isPresenting) togglePresent();
          classes = [];
          render();
          setStatus('Inicia sesión', 'bg-yellow-400 animate-pulse');
        }
      });

      render();
    };

    // PWA: Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('SW Registered!', reg))
          .catch(err => console.error('SW Error:', err));
      });
    }
  </script>
</body>
